---
title: Software
description: Installs software
privilege: TrustedInstaller
actions:
  - !status: {status: 'Installing Open-Shell', option: "ui", cpuArch: "x64"}
  - !run:
    exeDir: true
    exe: "SLNT.bat"
    weight: 50
    option: "ui"
    cpuArch: "x64"

  - !run:
    exeDir: true
    exe: "ame-hexer.exe"
    args: '"%WINDIR%\Resources\Themes\aero\Shell\NormalColor\shellstyle.dll" "3c69662069643d2261746f6d2848656c70427574746f6e29223e" "3c69662069643d2261746f6d282d2d2d52454d4f56454429223e" 120000'
    weight: 60
  - !run:
    exeDir: true
    exe: "ame-hexer.exe"
    args: '"%WINDIR%\Resources\Themes\aero\Shell\NormalColor\shellstyle.dll" "3c69662069643d2261746f6d2848656c70427574746f6e29223e" "3c69662069643d2261746f6d282d2d2d52454d4f56454429223e" 120000'
    weight: 60

  - !status: {status: 'Configuring user interface', option: "ui"}

    # Context Menu
  - !registryValue: {option: "ui", path: 'HKCU\Software\Classes\CLSID\{86ca1aa0-34aa-4e8b-a509-50c905bae2a2}\InprocServer32', value: '', type: REG_SZ, data: ''}
    # Old Explorer Search
  - !registryValue: {option: "ui", path: 'HKCU\Software\Classes\CLSID\{1d64637d-31e9-4b06-9124-e83fb178ac6e}\TreatAs', value: '', type: REG_SZ, data: '{64bc32b5-4eec-4de7-972d-bd8bd0324537}'}

  - !registryValue: {option: "ui", path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Themes\Personalize', value: 'SystemUsesLightTheme', type: REG_DWORD, data: 0}
  - !registryValue: {option: "ui", path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Themes\Personalize', value: 'AppsUseLightTheme', type: REG_DWORD, data: 1}

  - !registryValue: {option: "ui", path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced', value: 'StartShownOnUpgrade', type: REG_DWORD, data: 1}

  - !run:
    exeDir: true
    exe: "OLDUI.bat"
    option: "ui"
    weight: 10
    builds: [ '<22621.2428' ]
    cpuArch: "x64"
  - !run:
    exeDir: true
    exe: "ep_setup-22621.2428.59.1.exe"
    weight: 70
    option: "ui"
    builds: [ '<22621.2428' ]
    cpuArch: "x64"

  - !status: {status: 'Installing Git', option: "software"}
  - !software: { name: "git", source: chocolatey, option: "software" }

  - !status: {status: 'Installing 7zip', option: "software"}
  - !software:
    name: "7zip"
    source: chocolatey
    option: "software"
    package: '7zip'

  - !status: {status: 'Installing Firefox', option: "browser-firefox"}
  - !software:
    name: "Firefox"
    source: chocolatey
    option: "browser-firefox"
    package: 'firefox'
  - !run:
    exeDir: true
    exe: "FIREFOX.bat"
    weight: 150
    option: "browser-firefox"
  - !registryValue: {option: 'browser-firefox', path: 'HKLM\SOFTWARE\Policies\Mozilla\Firefox', value: 'BackgroundAppUpdate', data: '0', type: REG_DWORD}

  - !download:
    status: 'Downloading UGC'
    option: "browser-ugc"
    git: 'https://github.com/macchrome/winchrome'
    regex: 'chromium-.*_Win64\.7z'
    destination: "ugc.7z"
    package: 'ugc'
    iso: only

  - !run:
    status: 'Installing UGC'
    exeDir: true
    exe: "UGC\\UGC.bat"
    weight: 150
    option: "browser-ugc"
    hideWindow: true


  - !status: {status: 'Installing LibreWolf', option: "browser-librewolf"}
  - !software:
    name: "librewolf"
    source: chocolatey
    option: "browser-librewolf"
    package: 'librewolf'
    weight: 150
  - !run:
    exeDir: true
    exe: "LIBREWOLF.bat"
    weight: 150
    option: "browser-librewolf"

  - !status: {status: 'Downloading Brave', option: "browser-brave"}
  - !download: 
    option: "browser-brave"
    url: 'https://github.com/brave/brave-browser/releases/latest/download/BraveBrowserStandaloneSetup.exe'
    destination: "BraveBrowserStandaloneSetup.exe"
    package: 'brave'

  - !status: {status: 'Installing Brave', option: "browser-brave"}
  - !run:
    exeDir: true
    exe: "BRAVE.bat"
    weight: 150
    option: "browser-brave"
  - !registryValue: {option: "browser-brave", path: 'HKLM\SOFTWARE\Policies\BraveSoftware\Brave', value: 'BraveVPNDisabled', type: REG_DWORD, data: '1'}
  - !registryValue: {option: "browser-brave", path: 'HKLM\SOFTWARE\Policies\BraveSoftware\Brave', value: 'BraveRewardsDisabled', type: REG_DWORD, data: '1'}
  - !registryValue: {option: "browser-brave", path: 'HKLM\SOFTWARE\Policies\BraveSoftware\Brave', value: 'BraveWalletDisabled', type: REG_DWORD, data: '1'}
  - !registryValue: {option: "browser-brave", path: 'HKLM\SOFTWARE\Policies\BraveSoftware\Brave', value: 'BraveAIChatEnabled', type: REG_DWORD, data: '0'}

  - !status: {status: 'Configuring start menu', option: "ui"}
  - !run:
    exeDir: true
    exe: "STARTMENU.bat"
    weight: 15
    option: "ui"

  - !status: {status: 'Installing Thunderbird', option: "email-thunderbird"}
  - !software:
    name: "thunderbird"
    source: chocolatey
    option: "email-thunderbird"
    package: 'thunderbird'
    weight: 100
  - !run:
    exeDir: true
    exe: "THUNDERBIRDSHRT.bat"
    weight: 15
    option: "email-thunderbird"

  - !status: {status: 'Installing Spark', option: "email-spark"}
  - !software: 
    name: "sparkmail"
    source: chocolatey
    option: "email-spark"
    package: 'sparkmail'
    weight: 70

  - !status: {status: 'Installing Mailspring', option: "email-mailspring", iso: false, oobe: false}
  - !software:
    # Doesn't work in OOBE, investigate
    iso: false
    oobe: false
    name: "mailspring"
    source: chocolatey
    option: "email-mailspring"
    package: 'mailspring'
    weight: 70

  - !status: {status: 'Installing VLC', option: "media-vlc"}
  - !software:
    name: "vlc"
    source: chocolatey
    option: "media-vlc"
    package: 'vlc'
    weight: 70
    
  - !status: {status: 'Installing mpv', option: "media-mpv"}
  - !software:
    name: "mpv"
    source: chocolatey
    option: "media-mpv"
    package: 'mpv'
    weight: 70

