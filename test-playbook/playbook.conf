<?xml version="1.0" encoding="utf-8"?>
<Playbook>
	<Name>Privacy+</Name>
	<Username>Ameliorated</Username>
	<ShortDescription>Official Privacy+ Playbook for Windows 11</ShortDescription>
	<Title>Windows 11 Privacy+ Playbook</Title>
	<Description>This Playbook will ameliorate your installation&#xD;&#xA;&#xD;&#xA;The amelioration process makes heavy alterations to your installation. This Playbook assists you in quickly deploying Privacy+ with a default configuration.</Description>
	<Details>Official Privacy+ Playbook for Windows 11. Cutting the tumor out of your OS.</Details>
	<Version>0.8.2</Version>
	<UniqueId>9010e718-4b54-443f-8354-d893cd50fdde</UniqueId>
	<Overhaul>true</Overhaul>
	<SupportedBuilds>
		<string>22000</string>
		<string>22621</string>
		<string>22631</string>
		<string>22635</string>
		<string>26100</string>
		<string>26200</string>
	</SupportedBuilds>
	<Requirements>
		<Requirement>Internet</Requirement>
		<Requirement>NoPendingUpdates</Requirement>
		<Requirement>NoTweakware</Requirement>
		<Requirement>Activation</Requirement>
		<Requirement>UCPDDisabled</Requirement>
		<Requirement>NoAntivirus</Requirement>
		<Requirement>LocalAccounts</Requirement>
		<Requirement>AdministratorPasswordSet</Requirement>
		<Requirement>PluggedIn</Requirement>
	</Requirements>
	<ProductCode>117</ProductCode>
	<ProgressText>Optimizing various settings, improving the user interface experience, installing replacement apps, and removing hundreds of privacy infringing executables from the system.</ProgressText>
	<Git>https://github.com/Ameliorated-LLC/AME-11</Git>
	<Website>https://ameliorated.io</Website>
	<UpgradableFrom>0.6-0.7</UpgradableFrom>
	<SupportsISO>true</SupportsISO>
	<ISO>
		<DisableBitLocker>true</DisableBitLocker>
		<DisableHardwareRequirements>true</DisableHardwareRequirements>
	</ISO>
	<OOBE>
		<!-- <Internet>Request</Internet> -->
		<BulletPoints>
			<BulletPoint Icon="Lock" Title="Locked-down" Description="Windows authentication is set to mimic macOS and Linux, defending against two-thirds of the usual attack surface."/>
			<BulletPoint Icon="Privacy" Title="Privacy first" Description="The deletion process targets crucial services including Defender and Update, rendering them irretrievable."/>
			<BulletPoint Icon="Rocket" Title="Ready-made" Description="New default apps, preconfigured users, and refined UI changes will all be implemented as defined."/>
		</BulletPoints>
	</OOBE>
	<Software>
		<Package Option="browser-firefox" DefaultWebBrowser="true">
			<Name>firefox</Name>
			<Title>Firefox</Title>
			<Description>Fully featured web browser, configured by AME for optimal usability and privacy.</Description>
			<Icon>firefox.png</Icon>
		</Package>
		<Package Option="browser-ugc" DefaultWebBrowser="true">
			<Name>ugc</Name>
			<Title>UGC - Chromium</Title>
			<Description>Chromium with all Google elements stripped, comes with UBO and a plugin system.</Description>
			<Icon>chromium.png</Icon>
		</Package>
		<Package Option="browser-librewolf" DefaultWebBrowser="true">
			<Name>librewolf</Name>
			<Title>LibreWolf</Title>
			<Description>Privacy focused browser, configured by AME for optimal usability.</Description>
			<Icon>librewolf.png</Icon>
		</Package>
		<Package Option="browser-brave" DefaultWebBrowser="true">
			<Name>brave</Name>
			<Title>Brave</Title>
			<Description>Privacy focused browser, configured by AME for optimal usability.</Description>
			<Icon>brave.png</Icon>
		</Package>
		<Package Option="email-thunderbird">
			<Name>thunderbird</Name>
			<Title>Thunderbird - email client</Title>
			<Description>Fast, fully open-source email client with support for IMAP, POP3, and more."</Description>
			<Icon>thunderbird.png</Icon>
		</Package>
		<Package Option="email-spark">
			<Name>sparkmail</Name>
			<Title>Spark - email client</Title>
			<Description>Efficient email client with a clean UI, supporting most email protocols.</Description>
			<Icon>spark.png</Icon>
		</Package>
		<Package Option="email-mailspring">
			<Name>mailspring</Name>
			<Title>Mailspring - email client</Title>
			<Description>Efficient fully open-source email client, supporting most email protocols.</Description>
			<Icon>mailspring.png</Icon>
		</Package>
		<Package Option="media-vlc">
			<Name>vlc</Name>
			<Title>VLC - media player</Title>
			<Description>User-friendly media player with support for all major video file formats.</Description>
			<Icon>vlc.png</Icon>
		</Package>
		<Package Option="media-mpv">
			<Name>mpv</Name>
			<Title>mpv - media player</Title>
			<Description>Powerful media player with support for all major video file formats.</Description>
			<Icon>mpv.png</Icon>
		</Package>
		<Package Option="office-onlyoffice">
			<Name>onlyoffice</Name>
			<Title>OnlyOffice</Title>
			<Description>Powerful open-source office suite, supporting proprietary file formats including .docx.</Description>
			<Icon>onlyoffice.png</Icon>
		</Package>
		<Package Option="office-freeoffice">
			<Name>freeoffice</Name>
			<Title>FreeOffice</Title>
			<Description>Closed-source free MS Office alternative, supporting proprietary file formats including .docx.</Description>
			<Icon>freeoffice.png</Icon>
		</Package>
		<Package Option="office-libreoffice">
			<Name>libreoffice</Name>
			<Title>LibreOffice</Title>
			<Description>Open-source MS Office alternative, supporting proprietary file formats including .docx.</Description>
			<Icon>libreoffice.png</Icon>
		</Package>
		<Package Option="ame-tools">
			<Name>appfetch</Name>
			<Title>App Fetch Experimental</Title>
			<Description>Tool for downloading MS Store apps without any dependency on system MS Store services.</Description>
			<Icon>appfetch.png</Icon>
		</Package>
		<Package Option="ame-tools">
			<Name>settings</Name>
			<Title>Privacy+ Settings</Title>
			<Description>Tool for managing a large assortment of Privacy+ settings after installation.</Description>
			<Icon>settings.png</Icon>
		</Package>
		<Package Option="software">
			<Name>nomacs</Name>
			<Title>nomacs - image viewer</Title>
			<Description>Powerful image viewer with support for all major image formats.</Description>
			<Icon>nomacs.png</Icon>
		</Package>
		<Package Option="software">
			<Name>7zip</Name>
			<Title>7zip - archive extractor</Title>
			<Description>Compressed archive extraction tool with support for zip, rar, 7z, encryption, and more.</Description>
			<Icon>7zip.png</Icon>
		</Package>
	</Software>
