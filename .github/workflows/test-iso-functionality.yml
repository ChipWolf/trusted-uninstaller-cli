name: Test ISO Functionality

on:
  workflow_dispatch:
    inputs:
      iso_artifact_url:
        description: 'URL or artifact name for the Windows ISO to test'
        required: false
        default: ''
      trusteduninstaller_run_id:
        description: 'TrustedUninstaller CLI build run ID to test with'
        required: false
        default: 'latest'
  push:
    branches: [ public ]
    paths: [ '.github/workflows/test-iso-functionality.yml' ]

permissions:
  contents: read
  actions: write
  checks: read
  deployments: read
  issues: read
  packages: read
  pull-requests: read
  repository-projects: read
  security-events: read
  statuses: read

jobs:
  test-iso:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup .NET Framework
      uses: microsoft/setup-msbuild@v2
      
    - name: Download TrustedUninstaller CLI build artifacts
      if: ${{ github.event.inputs.trusteduninstaller_run_id != 'latest' }}
      run: |
        gh run download ${{ github.event.inputs.trusteduninstaller_run_id }} --name trusted-uninstaller-cli-build
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Download latest TrustedUninstaller CLI build artifacts
      if: ${{ github.event.inputs.trusteduninstaller_run_id == 'latest' }}
      run: |
        $latestRun = gh run list --workflow="build-windows.yml" --status=success --limit=1 --json databaseId | ConvertFrom-Json | Select-Object -First 1
        gh run download $latestRun.databaseId --name trusted-uninstaller-cli-build
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Create test playbook
      run: |
        New-Item -ItemType Directory -Force -Path "test-playbook"
        New-Item -ItemType Directory -Force -Path "test-playbook/Configuration"
        
        # Create a minimal test playbook YAML
        @"
        Name: Test Playbook
        Version: 1.0.0
        SupportedBuilds: ['22621']
        Description: Test playbook for ISO functionality
        
        Actions:
          - Task: Configure Test Action
            Actions:
              - !registryValue:
                  KeyName: 'HKLM\SOFTWARE\Test'
                  Value: 'TestValue'
                  Data: 'TestData'
                  Type: REG_SZ
        "@ | Out-File -FilePath "test-playbook/playbook.yaml" -Encoding UTF8
        
        # Create a minimal configuration YAML
        @"
        title: Test Configuration
        description: Test configuration for ISO mastering
        
        actions:
          - !registryValue:
              KeyName: 'HKLM\SOFTWARE\TestConfig'
              Value: 'ConfigValue'
              Data: 'ConfigData'
              Type: REG_SZ
        "@ | Out-File -FilePath "test-playbook/Configuration/test-config.yaml" -Encoding UTF8
        
    - name: Test CLI Help Command
      run: |
        ./TrustedUninstaller.CLI.exe --help
        
    - name: Test CLI Version Command  
      run: |
        ./TrustedUninstaller.CLI.exe --version
        
    - name: Check cross-repo access
      run: |
        Write-Host "Testing access to win-img-factory repository..."
        try {
          gh repo view wolfwarp/win-img-factory --json name,isPrivate,visibility
        } catch {
          Write-Host "Cannot access repository info: $_"
        }
        
    - name: Download ISO from win-img-factory
      run: |
        Write-Host "Downloading ISO artifact from win-img-factory build..."
        
        # Try to download the artifact from the specified run
        try {
          # Set up GitHub CLI with token for cross-repo access
          $env:GITHUB_TOKEN = "${{ secrets.GITHUB_TOKEN }}"
          
          # First try to view the run details
          Write-Host "Checking run details..."
          gh run view 18699722234 --repo wolfwarp/win-img-factory
          
          # Download from the specific win-img-factory run
          Write-Host "Attempting to download artifacts..."
          gh run download 18699722234 --repo wolfwarp/win-img-factory
          
          # List what was downloaded
          Write-Host "Downloaded files:"
          Get-ChildItem -Recurse | Where-Object { -not $_.PSIsContainer } | ForEach-Object { Write-Host $_.FullName }
          
          # Find the ISO file in the downloaded artifacts
          $isoFiles = Get-ChildItem -Recurse -Filter "*.iso"
          if ($isoFiles.Count -gt 0) {
            $isoFile = $isoFiles[0]
            Write-Host "Found ISO file: $($isoFile.FullName)"
            Write-Host "ISO file size: $([math]::Round($isoFile.Length / 1MB, 2)) MB"
            
            # Move/copy the ISO to a standard location
            Copy-Item $isoFile.FullName "test-input.iso"
            Write-Host "Copied ISO to test-input.iso"
          } else {
            Write-Host "No ISO files found in artifacts. Available files:"
            Get-ChildItem -Recurse | ForEach-Object { Write-Host "  $($_.Name)" }
          }
          
        } catch {
          Write-Host "Failed to download from win-img-factory: $_"
          Write-Host "Creating fallback test ISO structure..."
          
          # Fallback: Create a minimal test ISO structure
          New-Item -ItemType Directory -Force -Path "test-iso"
          New-Item -ItemType Directory -Force -Path "test-iso/sources"
          
          # Create a dummy install.wim file (very small for testing)
          $dummyContent = "This is a test WIM file for ISO functionality testing"
          $dummyContent | Out-File -FilePath "test-iso/sources/install.wim" -Encoding ASCII
          
          # Create basic ISO structure files
          "Test ISO" | Out-File -FilePath "test-iso/README.txt" -Encoding ASCII
          Write-Host "Created fallback test ISO structure at test-iso/"
        }
        
    - name: Test ISO Command with Real ISO
      run: |
        Write-Host "Testing ISO command with downloaded ISO..."
        
        # Determine which ISO file to use
        $isoPath = "test-input.iso"
        if (-not (Test-Path $isoPath)) {
          $isoPath = "test-iso"
          Write-Host "Using fallback test ISO structure"
        } else {
          Write-Host "Using downloaded ISO: $isoPath"
        }
        
        try {
          # Test with the downloaded ISO
          Write-Host "Running TrustedUninstaller ISO command..."
          $process = Start-Process -FilePath "./TrustedUninstaller.CLI.exe" -ArgumentList @(
            "ISO",
            "--playbook-path", "test-playbook",
            "--iso-path", $isoPath,
            "--output-path", "ameliorated-test.iso",
            "--architecture", "x64",
            "--verified"
          ) -Wait -NoNewWindow -PassThru -RedirectStandardOutput "iso-output.txt" -RedirectStandardError "iso-error.txt"
          
          Write-Host "ISO Command Exit code: $($process.ExitCode)"
          
          if (Test-Path "iso-output.txt") {
            Write-Host "=== ISO STDOUT ==="
            Get-Content "iso-output.txt"
          }
          
          if (Test-Path "iso-error.txt") {
            Write-Host "=== ISO STDERR ==="  
            Get-Content "iso-error.txt"
          }
          
          # Check if output ISO was created
          if (Test-Path "ameliorated-test.iso") {
            $outputIso = Get-Item "ameliorated-test.iso"
            Write-Host "✅ Output ISO created successfully!"
            Write-Host "Output ISO size: $([math]::Round($outputIso.Length / 1MB, 2)) MB"
          } else {
            Write-Host "❌ Output ISO was not created"
          }
          
        } catch {
          Write-Host "Exception running ISO command: $_"
        }
        
    - name: Test Invalid ISO Command
      run: |
        # Test error handling with invalid parameters
        Write-Host "Testing error handling with invalid parameters..."
        
        try {
          $process = Start-Process -FilePath "./TrustedUninstaller.CLI.exe" -ArgumentList @(
            "ISO",
            "--playbook-path", "nonexistent",
            "--iso-path", "nonexistent.iso",
            "--output-path", "output-test.iso"
          ) -Wait -NoNewWindow -PassThru -RedirectStandardOutput "output2.txt" -RedirectStandardError "error2.txt"
          
          Write-Host "Exit code for invalid params: $($process.ExitCode)"
          
          if (Test-Path "output2.txt") {
            Write-Host "=== STDOUT (Invalid) ==="
            Get-Content "output2.txt"
          }
          
          if (Test-Path "error2.txt") {
            Write-Host "=== STDERR (Invalid) ==="
            Get-Content "error2.txt"
          }
          
        } catch {
          Write-Host "Exception with invalid params: $_"
        }
        
    - name: List available CLI commands
      run: |
        Write-Host "Checking what commands are available in the CLI..."
        
        # Try to get help for different command formats
        foreach ($helpArg in @("--help", "-h", "help", "/?")) {
          Write-Host "=== Testing help with: $helpArg ==="
          try {
            $process = Start-Process -FilePath "./TrustedUninstaller.CLI.exe" -ArgumentList $helpArg -Wait -NoNewWindow -PassThru -RedirectStandardOutput "help_$helpArg.txt" -RedirectStandardError "help_err_$helpArg.txt"
            
            if (Test-Path "help_$helpArg.txt") {
              Get-Content "help_$helpArg.txt"
            }
            if (Test-Path "help_err_$helpArg.txt") {
              Write-Host "Errors:"
              Get-Content "help_err_$helpArg.txt"
            }
          } catch {
            Write-Host "Failed with $helpArg : $_"
          }
          Write-Host ""
        }